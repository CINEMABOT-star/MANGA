<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MANGA Reader</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <section id="loginView" class="loginView" aria-label="Accesso">
      <form id="loginForm" class="loginBox">
        <span class="mark loginMark">M</span>
        <h1>Accesso lettura</h1>
        <p>Inserisci le credenziali per aprire il reader.</p>
        <label for="usernameInput">Username</label>
        <input id="usernameInput" name="username" type="text" autocomplete="username" required />
        <label for="passwordInput">Password</label>
        <input
          id="passwordInput"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />
        <button type="submit">Entra</button>
        <p id="loginError" class="loginError" role="alert" hidden>Credenziali non valide.</p>
      </form>
    </section>

    <div id="appView" hidden>
    <header class="topbar">
      <div class="brand">
        <span class="mark">M</span>
        <div>
          <h1 id="siteTitle">MANGA Reader</h1>
          <p id="chapterMeta">Caricamento...</p>
        </div>
      </div>

      <nav class="toolbar" aria-label="Controlli lettura">
        <button id="libraryBtn" type="button" title="Libreria">Libreria</button>
        <select id="chapterSelect" aria-label="Capitolo"></select>
        <button id="bookmarkBtn" type="button" title="Salva segnalibro">Segna</button>
        <button id="translateBtn" type="button" title="Traduci capitolo">Traduci IT</button>
        <button id="fitBtn" type="button" title="Cambia larghezza">Fit</button>
        <button id="themeBtn" type="button" title="Cambia tema">Tema</button>
        <button id="logoutBtn" type="button" title="Esci">Esci</button>
      </nav>
    </header>

    <div class="progressWrap" aria-hidden="true">
      <div id="progressBar" class="progressBar"></div>
    </div>

    <div id="translateStatus" class="translateStatus" hidden></div>

    <main>
      <section id="libraryView" class="libraryView" aria-label="Libreria manga"></section>
      <section id="reader" class="reader" aria-label="Pagine webtoon"></section>

      <section id="emptyState" class="emptyState" hidden>
        <h2>Nessuna immagine trovata</h2>
        <p>
          Metti le immagini in <code>chapters/capitolo-1</code>, poi esegui
          <code>tools\generate-manifest.ps1</code> e pubblica le modifiche.
        </p>
      </section>
    </main>

    <button id="topBtn" class="topBtn" type="button" title="Torna su">Su</button>
    </div>
  </body>
</html>
